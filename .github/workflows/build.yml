name: Build MAUI App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Publish Windows
        run: dotnet publish -f net8.0-windows10.0.19041.0 -c Release -o win-build
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-app
          path: win-build

  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Publish Android
        run: dotnet publish -f net8.0-android -c Release -o android-build
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-app
          path: android-build
